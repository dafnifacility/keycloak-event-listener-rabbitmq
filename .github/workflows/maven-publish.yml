# This workflow will build a package using Maven and then publish it to GitHub packages when a release is created
# For more information see: https://github.com/actions/setup-java#apache-maven-with-a-settings-path

# File updated by Sarah Byrne to bump Java version for KC 26

name: Maven Package

on:
  release:
    types: [created]

permissions:
  contents: read
  packages: write

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: 21
        server-id: github # Value of the distributionManagement/repository/id field of the pom.xml
        settings-path: ${{ github.workspace }} # location for the settings.xml file

    - name: Build with Maven
      run: ./mvnw -B -DskipTests package --file pom.xml

    - name: Publish to GitHub Packages Apache Maven
      run: >-
        ./mvnw -B -DskipTests deploy
        -DaltDeploymentRepository=github::default::https://maven.pkg.github.com/${{ github.repository }}
        -s $GITHUB_WORKSPACE/settings.xml
      env:
        GITHUB_TOKEN: ${{ github.token }}
